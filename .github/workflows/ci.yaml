name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev tools
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest
